<script>
  function enviar() {
    const nome = document.getElementById('nome');
    const email = document.getElementById('email');
    const status = document.getElementById('status');
    const telefone = document.getElementById('telefone');
    const urgencia = document.getElementById('urgencia');
    const mensagem = document.getElementById('mensagem');

    const button = document.getElementById('enviar');
    button.disabled = true
    document.getElementById('enviar').innerHTML = "Enviando...";

    if(nome.value === "" || email.value === '' || status.value === '' || telefone.value === '' || urgencia.value === '' || mensagem.value === '') {
      alert("Nome, E-mail, Telefone, Nível Urgência ou Mensagem está vazio!")
      document.getElementById('enviar').innerHTML = "Salvar na Planilha";
      button.disabled = false;
      return;
    }

    let dados = {
      nome: nome.value,
      email: email.value,
      status: status.value,
      telefone: telefone.value,
      urgencia: urgencia.value,
      mensagem: mensagem.value
    };

    google.script.run
      .withSuccessHandler(function(res) {
        alert(res);
        nome: nome.value = "";
        email: email.value = "";
        status: status.value = "Pendente";
        telefone: telefone.value = "";
        urgencia: urgencia.value = "";
        mensagem: mensagem.value = "";
        document.getElementById('enviar').innerHTML = "Salvar na Planilha";
        button.disabled = false;
      })
      .salvarDados(dados);
  }

  window.onload = atualizarContador;

  function atualizarContador() {
    document.getElementById('contador').innerHTML = "Buscando...";
    document.getElementById('ultimaPessoa').innerHTML = "Buscando...";

    google.script.run
      .withSuccessHandler(function(valor) {
        document.getElementById('contador').innerHTML = valor;
    })
    .obterTotalCadastros();
    
    google.script.run
      .withSuccessHandler(function(nome) {
        document.getElementById('ultimaPessoa').innerHTML = nome;
    })
    .buscarUltimoNome();
  }
</script>
