<script>
  function enviar() {
    const nome = document.getElementById('nome');
    const email = document.getElementById('email');
    const telefone = document.getElementById('telefone');
    const urgencia = document.getElementById('urgencia');
    const mensagem = document.getElementById('mensagem');

    const button = document.getElementById('enviar');
    desativarBtn(button);
    document.getElementById('enviar').innerHTML = "Enviando...";

    if(nome.value === "" || email.value === '' || telefone.value === '' || urgencia.value === '' || mensagem.value === '') {
      alert("Nome, E-mail, Telefone, Nível Urgência ou Mensagem está vazio!");
      ativarBtn(button);
      document.getElementById('enviar').innerHTML = "Salvar na Planilha";
      
      return;
    }

    let dados = {
      nome: nome.value,
      email: email.value,
      telefone: telefone.value,
      urgencia: urgencia.value,
      mensagem: mensagem.value
    };

    google.script.run.withSuccessHandler(
      function(res) {
        alert(res);
        nome: nome.value = "";
        email: email.value = "";
        telefone: telefone.value = "";
        urgencia: urgencia.value = "";
        mensagem: mensagem.value = "";
        ativarBtn(button);
        document.getElementById('enviar').innerHTML = "Salvar na Planilha";
      })
      .salvarDados(dados);
  }

  function desativarBtn(button) {
    button.disabled = true;
  }
  
  function ativarBtn(button) {
    button.disabled = false;
  }

  window.onload = function() {
    atualizarContador();
    metaDeCadastro();
    cadastradosHoje();
  };

  function atualizarContador() {
    let contador = document.getElementById('contador');
    let ultimaPessoa = document.getElementById('ultimaPessoa');
    let usuariosGmail = document.getElementById('usuarios-gmail');
    
    contador.innerHTML = "Buscando...";
    ultimaPessoa.innerHTML = "Buscando...";
    usuariosGmail.innerHTML = "Buscando...";

    google.script.run.withSuccessHandler(
      function(valor) {
        contador.innerHTML = valor;
        if (valor < 5) {
          contador.style.color = 'red';
        } else if (valor >= 5 && valor < 10) {
          contador.style.color = 'yellow';
        } else if (valor >= 10) {
          contador.style.color = 'green';
        }
    })
    .obterTotalCadastros();
    
    google.script.run.withSuccessHandler(
      function(nome) {
        ultimaPessoa.innerHTML = nome;
    })
    .buscarUltimoNome();

    google.script.run.withSuccessHandler(
      function(numeroDeGmail) {
        usuariosGmail.innerHTML = numeroDeGmail;
      })
      .buscarNumeroDeGmail();
  }

  function acharEmailPeloNome() {
    const nomeDoEmail = document.getElementById('acharEmail').value;
    const button = document.getElementById('acharEmail-Btn');

    desativarBtn(button);
    button.innerHTML = 'Buscando E-mail';

    google.script.run.withSuccessHandler(
      function(email) {
        document.getElementById('mensagemAchaEmail').innerHTML = email;
        ativarBtn(button);
        button.innerHTML = 'Encontrar E-mail';
      })
      .acharEmailPeloNome(nomeDoEmail);
  }

  function metaDeCadastro() {
    let meta = 20;
    let progressBarBlue = document.getElementById('progress-bar-blue');

    google.script.run.withSuccessHandler(
      function(numeroDeCadastros) {
        let porcentagem = (numeroDeCadastros * 100) / 20;

        progressBarBlue.style.width = porcentagem + "%";
      })
      .obterTotalCadastros();
  }

  function cadastradosHoje() {
    const cadastroDoDia = document.getElementById('cadastrados-hoje');
    cadastroDoDia.innerHTML = "Buscando...";

    google.script.run.withSuccessHandler(
      function(numeroHoje) {
        cadastroDoDia.innerHTML = numeroHoje;
      })
      .buscarCadastroDeHoje();
  }

  function limparDadosDaPlanilha() {
    const button = document.getElementById('limpar-planilha');

    button.innerHTML = 'Limpando Planilha...';
    desativarBtn(button);

    google.script.run.withSuccessHandler(
      function(res) {
        alert(res);
        button.innerHTML = 'Limpar Planilha!';
        ativarBtn(button);
      })
      .deletarDadosDaPlanilha();
  }
</script>
